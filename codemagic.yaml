workflows:
  ios-workflow:
    name: EdGuard iOS
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.iasolution.edguard"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.iasolution.edguard
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install pods
        script: cd ios/App && pod install
      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration

  android-workflow:
    name: EdGuard Android
    max_build_duration: 30
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
</CodeContent>
<parameter name="EmptyFile">false
