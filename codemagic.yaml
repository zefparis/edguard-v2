workflows:
  ios-workflow:
    name: EdGuard iOS
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.iasolution.edguard"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          set -euo pipefail
          npm install

      - name: Build web assets
        script: |
          set -euo pipefail
          npm run build

      - name: Capacitor sync
        script: |
          set -euo pipefail
          npx cap sync ios

      - name: Install pods
        script: |
          set -euo pipefail
          cd ios/App
          pod install

      - name: Sign
        script: |
          keychain initialize
          keychain add-certificates
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - contact@ia-solution.fr
        notify:
          success: true
          failure: true
